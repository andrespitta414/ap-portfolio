<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial; padding: 40px 20px; max-width: 600px; margin: 0 auto; }
        h1 { margin-bottom: 30px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; font-size: 14px; }
        button { background: #0066ff; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0052cc; }
        a { color: #0066ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Get in Touch</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Your name" required>
        <input type="email" name="email" placeholder="Your email" required>
        <textarea name="message" placeholder="Your message" rows="6" required></textarea>
        <button type="submit">Send</button>
    </form>
    <p style="margin-top: 20px;"><a href="/">Back to home</a></p>
</body>
</html>
